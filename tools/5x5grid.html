
<div id="a"></div>
<div id="b"></div>
<input type="range" min="0" max="255" step="1" id="red">
<script>
  let h = window.innerHeight;
  let g = "#000000";
  for (let y = 0; y < 5; y++) {
    for (let x = 0; x < 5; x++) {
      let i = document.createElement("div")
      i.style.position = "absolute";
      i.style.top = `${h/5*y}px`;
      i.style.left = `${h/5*x}px`;
      i.onclick = () => {
        i.style.background = g;
      };
      document.getElementById("a").appendChild(i)
    }
  }

  setInterval(() => {
    g = `#${[
      document.getElementById("red").value, 
      document.getElementById("green").value, 
      document.getElementById("blue").value].map(x => x.toString(16).padStart(2, "0")}`
    document.getElementById("b").style.background = g
  }, 50)
</script>
