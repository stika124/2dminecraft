<style>
  * {
   overflow: hidden;
   box-sizing: border-box;
   font-family: white;
  }
  #b {
    position: absolute;
    top: 6px; right: 6px;
    border: 1px solid black;
  }
  #red, #green, #blue {
    position: absolute;
    right: 6px;
    width: 100px;
  }
  #red {
    bottom: 56px;
  }
  #green {
    bottom: 36px;
  }
  #blue {
    bottom: 16px;
  }
  [onclick^="t"] {
   position: absolute;
   top: 50vh;
   right: 6px;
  }
 
</style>
<div id="a"></div>
<div id="b"></div>
<input type="range" min="0" max="255" step="1" id="red" class="range">
<input type="range" min="0" max="255" step="1" id="green" class="range">
<input type="range" min="0" max="255" step="1" id="blue" class="range">
<button onclick="tt()">paint off</button>
<button onclick="gg()">grid off</button>
<script>
  let h = window.innerHeight;
  let w = window.innerWidth;
  let can = true;
  let grid = true;
  let tt = () => can = !can;
  let g = "#000000";
  for (let y = 0; y < 5; y++) {
    for (let x = 0; x < 5; x++) {
      let i = document.createElement("div")
      i.className = "grid"
      i.style.position = "absolute";
      i.style.top = `${h/5*y}px`;
      i.style.left = `${h/5*x}px`;
      i.style.width = `${h/5}px`;
      i.style.height = `${h/5}px`;
      i.style.border = "1px solid black";
      i.onclick = () => {
        if (can) {
          i.style.background = g;
          i.innerText = g;
          i.style.color = (Number(g.at(-2)) < 8) ? "white" : "black"
        }
      };
      document.getElementById("a").appendChild(i)
    }
  }

  setInterval(() => {
    let h = window.innerHeight;
    let w = window.innerWidth;
    g = `#${[
      document.getElementById("red").value, 
      document.getElementById("green").value, 
      document.getElementById("blue").value].map(x => Number(x).toString(16).padStart(2, "0")).join("")}`
    document.getElementById("b").style.background = g
    document.getElementById("b").style.width = `${w-h-12}px`;
    document.getElementById("b").style.height = `${h/5}px`;
    document.getElementById("b").innerText = g;
    document.querySelectorAll(".range").forEach(k => {
      k.style.width = `${w-h-12}px`
    });

   document.querySelector("[onclick^='t']").innerText = can ? "paint off" : "paint on";
   document.querySelector("[onclick^='g']").innerText = grid ? "grid off" : "grid on";
   document.querySelectorAll(".grid").forEach(l => l.style.border = grid ? "1px solid black" : "none")
  }, 50)
</script>
